    <script>
   async function loadNotes() {
    const container = document.getElementById('notesDisplay');
    const cloudName = "dbe8gp9jl"; // Your Cloudinary name
    
    try {
        // 1. Fetch the list from Cloudinary
        const response = await fetch(`https://cloudinary.com{cloudName}/image/list/senior_project_notes.json`);
        const data = await response.json();

        container.innerHTML = ""; // Clear the loading text

        // 2. Loop through and create the layout for each note
        data.resources.forEach(img => {
            const title = img.context?.custom?.title || "No Title";
            const desc = img.context?.custom?.desc || "No description";

            // This matches the layout from your screenshot
            container.innerHTML += `
                <div class="note-row" style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
                    <div class="uploaded-boxes" style="width: 150px;">
                        <img src="https://cloudinary.com{cloudName}/image/upload/${img.public_id}.${img.format}" 
                             style="width: 100%; border-radius: 15px;">
                    </div>
                    <div class="info-boxes" style="background: #d1e3ff; padding: 20px; border-radius: 20px; flex-grow: 1;">
                        <p><strong>Title:</strong> ${title}</p>
                        <p><strong>Description:</strong> ${desc}</p>
                    </div>
                </div>
            `;
        });
    } catch (e) {
        console.error("Gallery Error:", e);
        container.innerHTML = "<p>Make sure 'Resource List' is enabled in Cloudinary Settings.</p>";
    }
}
loadNotes();


    </script>
