    <div id="notesDisplay" class="notes-container">
    <p style="text-align: center; margin-top: 50px;">Loading shared notes...</p>
</div>

<script>
async function loadNotes() {
    const container = document.getElementById('notesDisplay');
    const cloudName = "dbe8gp9jl"; 

    const formData = new FormData();
    formData.append('file', selectedFile); 
    formData.append('upload_preset', uploadPreset);

    // This line is the most important one!
    formData.append('tags', 'senior_project_notes'); 

    // This adds your title and description so they show up later
    formData.append('context', `title=${title}|desc=${description}`);
    
    try {
        // Fetch the list from Cloudinary
        const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: 'POST',
        body: formData
    });
        
        if (!response.ok) throw new Error("List not found. Check Cloudinary settings.");
        
        const data = await response.json();
        container.innerHTML = ""; // Clear loading text

        data.resources.forEach(img => {
            // Extract metadata
            const title = img.context?.custom?.title || "Untitled Note";
            const desc = img.context?.custom?.desc || "No description provided.";
            const imgUrl = `https://res.cloudinary.com/${cloudName}/image/list/senior_project_notes.json`;

            // This structure uses your CSS .uploaded-boxes and .info-boxes
            container.innerHTML += `
                <div class="note-row">
                    <div class="uploaded-boxes">
                        <img src="${imgUrl}" alt="Note Image">
                    </div>
                    <div class="info-boxes note-details">
                        <p><strong>Title:</strong> ${title}</p>
                        <p><strong>Description:</strong> ${desc}</p>
                    </div>
                </div>
            `;
        });
    } catch (e) {
        console.error("Gallery Error:", e);
        container.innerHTML = `
            <div style="text-align: center; padding: 50px;">
                <p>Unable to load notes. Please ensure "Resource List" is enabled in Cloudinary Security settings.</p>
            </div>`;
    }
}
loadNotes();
</script>
